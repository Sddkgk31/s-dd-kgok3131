<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zehra'm</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0008}

canvas#bg{position:fixed;inset:0;z-index:0}

#vignette{
  position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 30%,rgba(8,0,5,.85) 100%);
  z-index:2;pointer-events:none
}

#scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;
}

/* Thin decorative line above */
.line-deco{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,#c9405a,#d4a04a,#c9405a,transparent);
  animation:lineGrow 1.8s ease forwards;
  animation-delay:.5s;
  margin-bottom:1.6rem;
}
@keyframes lineGrow{to{width:min(380px,55vw)}}

/* Main name */
.name{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(6rem,18vw,14rem);
  line-height:1.1;
  color:#f9c8d8;
  text-shadow:
    0 0 40px rgba(230,80,110,.9),
    0 0 80px rgba(200,50,80,.6),
    0 0 120px rgba(180,30,60,.35),
    0 2px 8px rgba(0,0,0,.8);
  position:relative;
  opacity:0;
  transform:translateY(30px) scale(.9);
  animation:nameIn 2s cubic-bezier(.16,1,.3,1) forwards, nameShimmer 5s ease-in-out infinite 3s;
  animation-delay:.9s, 3s;
  cursor:default;
  user-select:none;
  white-space:nowrap;
}

@keyframes nameShimmer{
  0%,100%{color:#f9c8d8;text-shadow:0 0 40px rgba(230,80,110,.9),0 0 80px rgba(200,50,80,.6),0 0 120px rgba(180,30,60,.35),0 2px 8px rgba(0,0,0,.8)}
  50%{color:#fdecd0;text-shadow:0 0 50px rgba(212,160,74,.9),0 0 90px rgba(190,130,50,.6),0 0 130px rgba(160,100,30,.35),0 2px 8px rgba(0,0,0,.8)}
}

.name .fill{ display:none; }

@keyframes nameIn{
  0%{opacity:0;transform:translateY(30px) scale(.9)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}



/* Glow behind text */
.name-glow{
  position:absolute;
  width:clamp(300px,60vw,700px);
  height:clamp(150px,25vw,300px);
  background:radial-gradient(ellipse,rgba(180,40,80,.22) 0%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:glowPulse 4s ease-in-out infinite 3s;
  pointer-events:none;z-index:-1;
}
@keyframes glowPulse{
  0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}
}

.line-deco2{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,#d4a04a,#c9405a,#d4a04a,transparent);
  animation:lineGrow 1.8s ease forwards;
  animation-delay:2s;
  margin-top:1.4rem;
}

/* Subtitle */
.subtitle{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:300;
  font-size:clamp(1rem,2.8vw,1.6rem);
  color:rgba(245,195,210,.7);
  letter-spacing:.35rem;
  opacity:0;
  animation:fadeUp 1.4s ease forwards;
  animation-delay:2.6s;
  margin-top:1.4rem;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

/* Heart */
.heart-wrap{
  margin-top:2rem;
  opacity:0;
  animation:fadeUp 1s ease forwards;
  animation-delay:3.2s;
}
.heart-svg{animation:hb 1.5s ease-in-out infinite}
@keyframes hb{
  0%,100%{transform:scale(1)}
  14%{transform:scale(1.28)}
  28%{transform:scale(1)}
  42%{transform:scale(1.18)}
  56%{transform:scale(1)}
}

/* Corner ornaments */
.corner{position:fixed;width:100px;height:100px;opacity:0;animation:fadeIn 1s ease forwards;animation-delay:3.5s;pointer-events:none;z-index:11}
.tl{top:20px;left:20px}
.tr{top:20px;right:20px;transform:scaleX(-1)}
.bl{bottom:20px;left:20px;transform:scaleY(-1)}
.br{bottom:20px;right:20px;transform:scale(-1)}
@keyframes fadeIn{to{opacity:.55}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="vignette"></div>

<!-- Corner SVG ornaments -->
<div class="corner tl">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 92 C8 8 92 8 92 8" stroke="#d4a04a" stroke-width=".8" opacity=".8"/>
  <path d="M18 92 C18 18 92 18 92 18" stroke="#c9405a" stroke-width=".4" opacity=".5"/>
  <circle cx="8" cy="92" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="92" cy="8" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="8" cy="8" r="1.2" fill="#c9405a" opacity=".6"/>
  <path d="M8 8 L8 30 M8 8 L30 8" stroke="#d4a04a" stroke-width=".6" opacity=".4"/>
  <path d="M40 8 Q8 40 8 70" stroke="#c9405a" stroke-width=".3" stroke-dasharray="2 4" opacity=".4"/>
</svg>
</div>
<div class="corner tr">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 92 C8 8 92 8 92 8" stroke="#d4a04a" stroke-width=".8" opacity=".8"/>
  <path d="M18 92 C18 18 92 18 92 18" stroke="#c9405a" stroke-width=".4" opacity=".5"/>
  <circle cx="8" cy="92" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="92" cy="8" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="8" cy="8" r="1.2" fill="#c9405a" opacity=".6"/>
  <path d="M8 8 L8 30 M8 8 L30 8" stroke="#d4a04a" stroke-width=".6" opacity=".4"/>
</svg>
</div>
<div class="corner bl">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 92 C8 8 92 8 92 8" stroke="#d4a04a" stroke-width=".8" opacity=".8"/>
  <path d="M18 92 C18 18 92 18 92 18" stroke="#c9405a" stroke-width=".4" opacity=".5"/>
  <circle cx="8" cy="92" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="92" cy="8" r="2.5" fill="#d4a04a" opacity=".9"/>
  <path d="M8 8 L8 30 M8 8 L30 8" stroke="#d4a04a" stroke-width=".6" opacity=".4"/>
</svg>
</div>
<div class="corner br">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 92 C8 8 92 8 92 8" stroke="#d4a04a" stroke-width=".8" opacity=".8"/>
  <path d="M18 92 C18 18 92 18 92 18" stroke="#c9405a" stroke-width=".4" opacity=".5"/>
  <circle cx="8" cy="92" r="2.5" fill="#d4a04a" opacity=".9"/>
  <circle cx="92" cy="8" r="2.5" fill="#d4a04a" opacity=".9"/>
  <path d="M8 8 L8 30 M8 8 L30 8" stroke="#d4a04a" stroke-width=".6" opacity=".4"/>
</svg>
</div>

<!-- Main scene -->
<div id="scene">
  <div class="line-deco"></div>

  <div class="name" aria-label="Zehra'm">
    <div class="name-glow"></div>
    Zehra'm
    <span class="fill" aria-hidden="true">Zehra'm</span>
  </div>

  <div class="line-deco2"></div>
  <div class="subtitle">Kalbimin biricik sahibi</div>

  <div class="heart-wrap">
    <svg class="heart-svg" width="32" height="28" viewBox="0 0 32 28" fill="none">
      <path d="M16 26 C16 26 2 16 2 8.5 C2 4.4 5.1 1 9 1 C12 1 14.5 2.8 16 5.2 C17.5 2.8 20 1 23 1 C26.9 1 30 4.4 30 8.5 C30 16 16 26 16 26Z" fill="url(#hg)" stroke="rgba(201,64,90,.4)" stroke-width=".6"/>
      <defs>
        <linearGradient id="hg" x1="2" y1="1" x2="30" y2="26" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f48fb1"/>
          <stop offset="50%" stop-color="#c9405a"/>
          <stop offset="100%" stop-color="#d4a04a"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   Canvas: starfield + floating rose petals
═══════════════════════════════════════════ */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* Stars */
const STAR_COUNT = 180;
const stars = Array.from({length: STAR_COUNT}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: .3 + Math.random() * 1.1,
  a: Math.random(),
  da: .003 + Math.random() * .006,
  phase: Math.random() * Math.PI * 2
}));

/* Petals */
class Petal {
  constructor(delay=0){
    this.reset(true);
    this.y = delay ? Math.random() * H : -20;
    this.delay = delay;
  }
  reset(init=false){
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -30;
    this.size = 3 + Math.random() * 8;
    this.speed = .4 + Math.random() * .9;
    this.drift = (Math.random()-.5) * .6;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random()-.5) * .03;
    this.alpha = 0;
    this.targetAlpha = .25 + Math.random() * .4;
    this.color = Math.random() > .5
      ? `rgba(${180+~~(Math.random()*60)},${50+~~(Math.random()*50)},${80+~~(Math.random()*50)}`
      : `rgba(${212+~~(Math.random()*30)},${155+~~(Math.random()*30)},${60+~~(Math.random()*30)}`;
  }
  update(){
    this.y += this.speed;
    this.x += this.drift;
    this.rot += this.rotSpeed;
    if(this.y < H*.1) this.alpha = Math.min(this.alpha + .008, this.targetAlpha);
    if(this.y > H*.85) this.alpha = Math.max(0, this.alpha - .012);
    if(this.y > H + 40) this.reset();
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha;
    // Simple petal shape
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * .55, 0, 0, Math.PI*2);
    ctx.fillStyle = this.color + ',' + this.alpha + ')';
    ctx.fill();
    ctx.restore();
  }
}

const petals = Array.from({length:60}, (_,i) => new Petal(i<30));

/* Orbs (soft background bokeh) */
const orbs = [
  {x:.25,y:.35,r:200,c:'rgba(140,20,60,'},
  {x:.75,y:.65,r:180,c:'rgba(180,80,30,'},
  {x:.5, y:.5, r:280,c:'rgba(80,0,40,'},
  {x:.1, y:.8, r:120,c:'rgba(120,60,20,'},
  {x:.9, y:.2, r:130,c:'rgba(160,30,70,'},
];

let mouseX = W/2, mouseY = H/2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  // Parallax on scene
  const dx = (e.clientX/W - .5) * 20;
  const dy = (e.clientY/H - .5) * 12;
  document.getElementById('scene').style.transform = `translate(${dx}px,${dy}px)`;
});

/* Click: burst of petals from click position */
document.addEventListener('click', e => {
  for(let i=0;i<8;i++){
    const p = new Petal();
    p.x = e.clientX + (Math.random()-.5)*40;
    p.y = e.clientY + (Math.random()-.5)*20;
    p.speed = -.5 - Math.random()*1.5; // fly up briefly
    p.alpha = .5;
    petals.push(p);
  }
});

let t = 0;
function draw(){
  ctx.clearRect(0,0,W,H);

  /* Deep bg */
  const bg = ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.4,Math.max(W,H)*.8);
  bg.addColorStop(0,'#280010');
  bg.addColorStop(.5,'#150009');
  bg.addColorStop(1,'#080005');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  /* Orbs */
  const mx = mouseX/W, my = mouseY/H;
  orbs.forEach(o => {
    const px = o.x + (mx-.5)*.04;
    const py = o.y + (my-.5)*.04;
    const g = ctx.createRadialGradient(px*W,py*H,0,px*W,py*H,o.r);
    g.addColorStop(0,o.c+'.18)');
    g.addColorStop(1,o.c+'0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  });

  /* Stars */
  t += .012;
  stars.forEach(s => {
    const flicker = s.a * (.7 + .3*Math.sin(t*s.da*30 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,230,240,${flicker})`;
    ctx.fill();
  });

  /* Petals */
  petals.forEach(p => { p.update(); p.draw(); });

  /* Scan-line subtle texture */
  ctx.globalAlpha = .025;
  for(let y=0;y<H;y+=4){
    ctx.fillStyle = '#000';
    ctx.fillRect(0,y,W,2);
  }
  ctx.globalAlpha = 1;

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
